<!DOCTYPE html> 
<html><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Late Mother's Day!</title>
<style>
#heart { 
    position: relative; 
    width: 100px; 
    height: 90px; 
} 

#heart:before, #heart:after { 
    position: absolute; 
    content: ""; 
    left: 50px; 
    top: 0; 
    width: 50px; 
    height: 80px; 
    background: red; 
    border-radius: 50px 50px 0 0; 
    transform: rotate(-45deg); 
    transform-origin: 0 100%; 
} 

#heart:after { 
    left: 0; 
    transform: rotate(45deg); 
    transform-origin :100% 100%; 
}

h1, h2 {
    text-align: center;
}
.overall-container{
    display: flex;
    justify-content: center;
    margin-top: 50px;
}
.heart-container{
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    max-width: 490px;
    background-color: white;
}
body{
    background-image: url("Flowers.jpg");
}
</style>
</head>
    <body>
    <div class="overall-container">
        <div class="heart-container">
            <h1>
            Happy Late Mother's Day!
        </h1>

<div id="heart"></div>

<h2>Love from Dean!</h2>
</div>
</div>

    </body>
</html>
